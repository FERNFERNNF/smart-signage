<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Audience Analytics</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: #111a2e;
}

.box {
  display: inline-block;
  background: #1b2a44;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
  width: 180px;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
<h1>🧠 AI Audience Analytics</h1>
<p>2.1 Smart Signage System</p>
</header>

<div class="box">
<h3>Total</h3>
<div id="total" class="big">0</div>
</div>

<div class="box">
<h3>Male</h3>
<div id="male" class="big">0</div>
</div>

<div class="box">
<h3>Female</h3>
<div id="female" class="big">0</div>
</div>

<br>

<button onclick="update()">🔄 Refresh AI</button>

<script>
function getData() {
  return {
    total: Math.floor(Math.random()*300),
    male: Math.floor(Math.random()*150),
    female: Math.floor(Math.random()*150),
  };
}

function update() {
  const d = getData();
  document.getElementById("total").innerText = d.total;
  document.getElementById("male").innerText = d.male;
  document.getElementById("female").innerText = d.female;
}

update();
setInterval(update, 4000);
</script>

</body>
</html>
