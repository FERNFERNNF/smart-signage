<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Signage AI Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #111a2e;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #16233d;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.big {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}

.status {
  margin: 20px;
  padding: 15px;
  background: #1f2d4a;
  border-radius: 10px;
  text-align: center;
}

canvas {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #38bdf8;
}
button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<header>
  <h1>🧠 Smart Signage AI Analytics</h1>
  <p>Real-time Audience Simulation System</p>
</header>

<div class="container">

  <div class="card">
    <h3>Total Viewers</h3>
    <div id="total" class="big">0</div>
  </div>

  <div class="card">
    <h3>Male</h3>
    <div id="male" class="big">0</div>
  </div>

  <div class="card">
    <h3>Female</h3>
    <div id="female" class="big">0</div>
  </div>

</div>

<div class="status">
  🎯 AI Status: <span id="aiStatus">Detecting audience...</span><br>
  📺 Content: <span id="content">Loading...</span>
</div>

<div style="padding:20px;">
  <canvas id="chart"></canvas>
</div>

<div style="text-align:center;">
  <button onclick="updateData()">🔄 Refresh AI</button>
</div>

<script>
let chart;

function randomData() {
  return {
    total: Math.floor(Math.random() * 300),
    male: Math.floor(Math.random() * 200),
    female: Math.floor(Math.random() * 200),
  };
}

function updateData() {
  const data = randomData();

  document.getElementById("total").innerText = data.total;
  document.getElementById("male").innerText = data.male;
  document.getElementById("female").innerText = data.female;

  // AI logic จำลอง
  if (data.total > 200) {
    document.getElementById("content").innerText = "🔥 Ads: High Traffic Campaign";
    document.getElementById("aiStatus").innerText = "High Density Audience Detected";
  } else if (data.total > 100) {
    document.getElementById("content").innerText = "📢 Ads: Standard Promotion";
    document.getElementById("aiStatus").innerText = "Normal Audience Flow";
  } else {
    document.getElementById("content").innerText = "ℹ️ Info Content Mode";
    document.getElementById("aiStatus").innerText = "Low Traffic Detected";
  }

  updateChart(data);
}

function updateChart(data) {
  chart.data.datasets[0].data = [data.male, data.female];
  chart.update();
}

function initChart() {
  const ctx = document.getElementById('chart');

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Male', 'Female'],
      datasets: [{
        data: [0, 0],
        backgroundColor: ['#38bdf8', '#f472b6']
      }]
    }
  });
}

initChart();
updateData();

// auto refresh
setInterval(updateData, 5000);

</script>

</body>
</html>
